<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Web Scraper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }
    
    .status.show {
      display: block;
    }
    
    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
    }
    
    .status.success {
      background: #e8f5e9;
      color: #388e3c;
    }
    
    .status.error {
      background: #ffebee;
      color: #d32f2f;
    }
    
    .info {
      margin-top: 30px;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 13px;
      color: #666;
    }
    
    .info h3 {
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }
    
    .info ul {
      margin-left: 20px;
    }
    
    .info li {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 Universal Web Scraper</h1>
    <p class="subtitle">Extract content from any website into CSV format</p>
    
    <div class="input-group">
      <label for="url">Website URL</label>
      <input 
        id="url" 
        type="text" 
        placeholder="https://example.com" 
        autocomplete="off"
      />
    </div>
    
    <button id="scrapeBtn" onclick="scrape()">Start Scraping</button>
    
    <div id="status" class="status"></div>
    
    <div class="info">
      <h3>ℹ️ How it works:</h3>
      <ul>
        <li>Scrapes up to 5 pages from the website</li>
        <li>Extracts headings, paragraphs, and list items</li>
        <li>Downloads results as a CSV file</li>
        <li>Respects robots.txt and rate limits</li>
      </ul>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById("url");
    const statusDiv = document.getElementById("status");
    const scrapeBtn = document.getElementById("scrapeBtn");

    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status show ${type}`;
    }

    function hideStatus() {
      statusDiv.className = "status";
    }

    async function scrape() {
      const url = urlInput.value.trim();

      if (!url) {
        showStatus("⚠️ Please enter a URL", "error");
        return;
      }

      // Basic URL validation
      try {
        new URL(url.startsWith('http') ? url : `https://${url}`);
      } catch (e) {
        showStatus("⚠️ Please enter a valid URL", "error");
        return;
      }

      showStatus("🔄 Scraping in progress... This may take up to 60 seconds", "loading");
      scrapeBtn.disabled = true;

      try {
        const response = await fetch("https://web-production-fc448b.up.railway.app/scrape", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({ error: "Unknown error" }));
          throw new Error(error.error || `HTTP ${response.status}`);
        }

        const blob = await response.blob();
        
        // Create download link
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `scraped_data_${Date.now()}.csv`;
        a.click();
        
        // Clean up
        URL.revokeObjectURL(a.href);

        showStatus("✅ Download complete! Check your downloads folder", "success");
        
        setTimeout(hideStatus, 5000);
      } catch (error) {
        console.error("Scraping error:", error);
        showStatus(`❌ Error: ${error.message}`, "error");
      } finally {
        scrapeBtn.disabled = false;
      }
    }

    // Allow Enter key to submit
    urlInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        scrape();
      }
    });
  </script>
</body>
</html>
