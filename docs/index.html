<!DOCTYPE html>
<html>
<head>
  <title>Universal Web Scraper</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 100px;">

  <h2>🌐 Universal Web Scraper</h2>

  <input id="url" placeholder="Enter website URL" style="width:300px; padding:10px;" />
  <br><br>
  <button onclick="scrape()" style="padding:10px 20px;">Start Scraping</button>

  <p id="status"></p>

  <script>
    async function scrape() {
      const url = document.getElementById("url").value;
      const status = document.getElementById("status");

      if (!url) {
        status.innerText = "Enter a URL first ⚠️";
        return;
      }

      status.innerText = "Scraping... ⏳";

      try {
        const res = await fetch("https://web-production-fc448b.up.railway.app/scrape", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        if (!res.ok) {
          status.innerText = "Error ❌ (check backend)";
          return;
        }

        const blob = await res.blob();

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "data.csv";
        a.click();

        status.innerText = "Done ✅ File downloaded";
      } catch (err) {
        console.error(err);
        status.innerText = "Server error ❌";
      }
    }
  </script>

</body>
</html>
